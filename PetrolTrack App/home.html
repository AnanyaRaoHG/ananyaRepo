<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Home - PetrolTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
	<link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="d-flex flex-column min-vh-100">

    <header class="petrol-header text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/483/483497.png" alt="logo" width="35">
        <div class="text-white mt-1 logo-text">PetrolTrack App</div>
    </header>

    <nav class="nav-custom d-flex justify-content-around py-3">
        <a href="home.html" class="fw-bold">Home</a>
        <a href="about.html">AboutUs</a>
        <a href="contact.html">ContactUs</a>
        <a href="profile.html">Profile</a>
    </nav>

    <main class="flex-grow-1 d-flex justify-content-center py-4">
        <div class="glass-container text-center text-white">
            <h2 class="h5 fw-bold mb-4">Check your Total Spending in just one click</h2>
            
			<div class="spending-circle mx-auto mb-4" onclick="window.location.href='view-entries.html'">
				<div class="circle-content">
					<span class="currency">Rs .</span>
					<span id="total-amount" class="amount">0</span>
				</div>
			</div>
            <button class="btn btn-login w-100 mb-5" onclick="window.location.href='add-entry.html'">Add Entry</button>

            <div class="stats-section text-start mb-4">

			<div class="month-selector d-flex justify-content-between align-items-center mb-3">
				<span style="cursor: pointer;" onclick="changeMonth(-1)">❮</span>
				<span class="fw-bold">November 2025</span>
				<span style="cursor: pointer;" onclick="changeMonth(1)">❯</span>
			</div>

			<div class="spending-summary-card p-3 mb-4">
				<div class="row text-center">
					<div class="col-6 mb-2">
						<small class="d-block opacity-75">LOWEST AMOUNT</small>
						<span id="lowest-amount" class="fw-bold">0</span>
					</div>
					<div class="col-6 mb-2">
						<small class="d-block opacity-75">HIGHEST AMOUNT</small>
						<span id="highest-amount" class="fw-bold">0</span>
					</div>
					<div class="col-12 mt-2">
						<small class="d-block opacity-75">Total Monthly Spendings</small>
						<span id="monthly-total" class="h4 fw-bold">0</span>
					</div>
				</div>
			</div>

            <p class="text-start mb-2 opacity-75">Current petrol trend (Bangalore)</p>
            <div class="chart-container">
                <canvas id="petrolTrendChart"></canvas>
            </div>
        </div>
    </main>

    <footer class="text-center text-white py-4 mt-auto footer-text">
        Developed by AnanyaRao. © 2025 PetrolTrack App.
    </footer>
	<script src="script.js"></script>
</body>
</html>
