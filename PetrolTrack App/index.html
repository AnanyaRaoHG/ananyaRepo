<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Login - PetrolTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
	<link rel="manifest" href="manifest.json">
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="petrol-header text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/483/483497.png" alt="logo" width="35">
        <div class="text-white mt-1 logo-text">PetrolTrack App</div>
    </header>

    <nav class="nav-custom d-flex justify-content-center gap-4 py-3">
        <a href="about.html" >AboutUs</a>
        <a href="contact.html">ContactUs</a>
    </nav>

    <main class="flex-grow-1 d-flex justify-content-center align-items-center py-5">
        <div class="glass-container text-center">
            <h1 class="text-white fw-bold mb-4">Welcome Back !</h1>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="loginUser" class="glass-input mb-3" placeholder="UserName" required>
                <input type="password" id="loginPass" class="glass-input mb-4" placeholder="Password" required>

                <div class="login-extras">
                    <div class="form-check d-flex align-items-center">
                        <input class="form-check-input" type="checkbox" id="rememberMeCheckbox">
                        <label class="form-check-label text-white ms-2" for="rememberMeCheckbox">Remember Me</label>
                    </div>
                    <a href="reset-password.html" class="text-white text-decoration-none small">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-login w-100 text-white mb-4">Login</button>
            </form>
            <div class="divider mb-4">OR</div>
            <a href="signup.html" class="btn btn-signup-outline w-100 text-decoration-none">New User? SignUp</a>
        </div>
    </main>
    <footer class="text-center text-white py-4 mt-auto footer-text">
        Developed by AnanyaRao. © 2025 PetrolTrack App.
    </footer>
    <script src="script.js"></script>
</body>
</html>
