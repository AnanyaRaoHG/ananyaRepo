<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>View Entries - PetrolTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
	<link rel="manifest" href="manifest.json">
</head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>


<body class="d-flex flex-column min-vh-100">

    <header class="petrol-header text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/483/483497.png" alt="logo" width="35">
        <div class="text-white mt-1 logo-text">PetrolTrack App</div>
    </header>

    <nav class="nav-custom d-flex justify-content-around py-3">
        <a href="home.html">Home</a>
        <a href="profile.html">Profile</a>
    </nav>
<div class="d-flex gap-2 mb-3 justify-content-center">
    <button class="btn btn-success btn-sm" onclick="exportToExcel()">Export to Excel</button>
    <button class="btn btn-danger btn-sm" onclick="exportToPDF()">Export to PDF</button>
</div>
	<main class="flex-grow-1 d-flex justify-content-center py-4">
		<div class="glass-container table-container text-center text-white" style="max-width: 95%; width: 100%;">
			
			<div class="mb-4">
				<input type="text" id="tableSearch" class="glass-input" placeholder="Search entries..." onkeyup="filterTable()">
			</div>

			<div class="table-responsive">
				<table class="table table-borderless petrol-table">
					<thead>
						<tr>
							<th>Date</th>
							<th>Price (Rs.)</th>
							<th>Place</th>
							<th>Rate/Ltr</th>
							<th>Litres</th>
							<th>Vehicle</th>
							<th>Notes</th>
						</tr>
					</thead>
					<tbody id="entriesBody">
						</tbody>
				</table>
			</div>
		</div>
	</main>

    <footer class="text-center text-white py-4 mt-auto footer-text">
        Developed by AnanyaRao. © 2025 PetrolTrack App.
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', displayTableEntries);
    </script>
</body>
</html>
