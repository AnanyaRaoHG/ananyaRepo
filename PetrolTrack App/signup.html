<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>SignUp - PetrolTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
	<link rel="manifest" href="manifest.json">
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="petrol-header text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/483/483497.png" alt="logo" width="35">
        <div class="text-white mt-1 logo-text">PetrolTrack App</div>
    </header>

    <nav class="nav-custom d-flex justify-content-center gap-4 py-3">
        <a href="index.html" >Back to Login</a>
		<a href="about.html" >AboutUs</a>
        <a href="contact.html" >ContactUs</a>
    </nav>

    <main class="flex-grow-1 d-flex justify-content-center align-items-center py-4">
        <div class="glass-container text-center">
            <h1 class="text-white fw-bold mb-4">Join PetrolTrack :)</h1>
            <form onsubmit="handleSignUp(event)">
                <input type="email" id="regEmail" class="glass-input mb-3" placeholder="Email Id" required>
                <input type="tel" id="regMobile" class="glass-input mb-3" placeholder="Mobile Number" required>
                <input type="text" id="regUser" class="glass-input mb-3" placeholder="UserName" required>
                <input type="password" id="regPass" class="glass-input mb-3" placeholder="Password" required>
                <input type="password" id="regConfirm" class="glass-input mb-4" placeholder="Confirm Password" required>
                <button type="submit" class="btn btn-login w-100 text-white">SignUp</button>
            </form>
        </div>
    </main>
    <footer class="text-center text-white py-4 mt-auto footer-text">
        Developed by AnanyaRao. © 2025 PetrolTrack App.
    </footer>
    <script src="script.js"></script>
</body>
</html>
