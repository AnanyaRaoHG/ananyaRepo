<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Contact Us - PetrolTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
	<link rel="manifest" href="manifest.json">
</head>
<body class="d-flex flex-column min-vh-100">

    <header class="petrol-header text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/483/483497.png" alt="logo" width="35">
        <div class="text-white mt-1 logo-text">PetrolTrack App</div>
    </header>

    <nav class="nav-custom d-flex justify-content-center gap-4 py-3">
        <a href="javascript:void(0)" onclick="smartNavigate(event)">Back to Home</a>
        <a href="about.html">AboutUs</a>
    </nav>

    <main class="flex-grow-1 d-flex justify-content-center align-items-center py-4">
        <div class="glass-container text-center text-white">
            <h1 class="fw-bold mb-3">We're Here to Help You Track</h1>
            <p class="opacity-90 mb-5">Have questions about tracking an expense? Need help understanding your cost report? Our team is ready to assist you.</p>
            
            <form action="https://formspree.io/f/mzdaebpn" method="POST">
                <input type="text" name="name" class="glass-input mb-3" placeholder="Your Name" required>
                <input type="email" name="email" class="glass-input mb-3" placeholder="Your Email Id" required>
                <textarea name="query" class="glass-input mb-4" placeholder="Your Query" rows="3" required></textarea>

                <button type="submit" class="btn btn-login w-100 text-white">Submit</button>
            </form>
        </div>
    </main>

    <footer class="text-center text-white py-4 mt-auto footer-text">
        Developed by AnanyaRao. © 2025 PetrolTrack App.
    </footer>
	<script src="script.js"></script>
</body>
</html>
