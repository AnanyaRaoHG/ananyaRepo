<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Profile - PetrolTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
	<link rel="manifest" href="manifest.json">
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="petrol-header text-center">
        <img src="https://cdn-icons-png.flaticon.com/512/483/483497.png" alt="logo" width="35">
        <div class="text-white mt-1 logo-text">PetrolTrack App</div>
    </header>

    <nav class="nav-custom d-flex justify-content-around py-3">
        <a href="home.html" class="fw-bold">Home</a>
		<a href="about.html" class="fw-bold">AboutUs</a>
        <a href="contact.html" class="fw-bold">ContactUs</a>
        <a href="#" class="fw-bold" onclick="handleLogout()">Logout</a>
    </nav>

    <main class="flex-grow-1 d-flex justify-content-center align-items-center py-4">
        <div class="glass-container text-center text-white">
            <div class="d-flex gap-2 mb-4">
                <button class="btn btn-outline-light btn-sm w-100" onclick="downloadBackup()">Backup</button>
                <button class="btn btn-outline-light btn-sm w-100" onclick="document.getElementById('restoreFile').click()">Restore</button>
                <input type="file" id="restoreFile" style="display:none" onchange="restoreBackup(event)">
            </div>
            
            <div class="profile-pic-wrapper mb-4">
                <img src="https://i.pravatar.cc/150?u=suzy" alt="Profile" class="profile-img">
            </div>

            <form id="profile-form" onsubmit="saveProfileChanges(event)">
                <input type="text" class="glass-input mb-3 text-center" id="prof-name" placeholder="User Name">
                <input type="email" class="glass-input mb-3 text-center" id="prof-email" placeholder="Email Id">
                <input type="tel" class="glass-input mb-3 text-center" id="prof-mobile" placeholder="Mobile Number">
                <input type="text" class="glass-input mb-4 text-center" id="prof-country" placeholder="Country">
                <button type="submit" class="btn btn-edit w-100 text-white">Save Changes</button>
            </form>
        </div>
    </main>
    <footer class="text-center text-white py-4 mt-auto footer-text">
        Developed by AnanyaRao. © 2025 PetrolTrack App.
    </footer>
    <script src="script.js"></script>
</body>
</html>
